###########################################################################
# UPSTREAMS HTTP (Porta 80)
###########################################################################

upstream sentry_http {
    server 192.168.2.49:80;
    server 192.168.1.49:80 backup;  # Fallback: servidor antigo
}

upstream grafana_http {
    server 192.168.2.104:80;
    server 192.168.1.104:80 backup;  # Fallback: servidor antigo
}

upstream allDefault_http {
    server 192.168.2.116:80;
    server 192.168.1.116:80 backup;  # Fallback: servidor antigo
}

upstream otlp {
    server 192.168.2.223:4317;
    server 192.168.1.223:4317 backup;  # Fallback: servidor antigo
}

upstream ollama {
    server 192.168.2.233:80;
    server 192.168.1.233:80 backup;  # Fallback: servidor antigo
}

upstream openreplay {
    server 192.168.2.70:80;
    server 192.168.1.70:80 backup;  # Fallback: servidor antigo
}
upstream prometheus {
    server 192.168.2.104:9092;
    server 192.168.1.104:9092 backup;  # Fallback: servidor antigo
}
upstream monitor {
    server 192.168.2.103:80;
    server 192.168.1.103:80 backup;  # Fallback: servidor antigo
}
upstream proxy {
    server 192.168.2.103:8888;
    server 192.168.1.103:8888 backup;  # Fallback: servidor antigo
}
upstream clawd {
    server 127.0.0.1:18789;
}
upstream supabase {
    server 192.168.2.37:80;
    server 192.168.1.37:80 backup;  # Fallback: servidor antigo
}
upstream coolify {
    server 192.168.2.35:80;
    server 192.168.1.35:80 backup;  # Fallback: servidor antigo
}
upstream bytoken {
    server 192.168.2.250:443;
}
map $host $backend_name_http {
    # Formato: dominio.com backend_name;
    
    sentry.sittax.com.br      sentry_http;
    grafana.sittax.com.br     grafana_http;
    otlp.sittax.com.br        otlp;
    ollama.sittax.com.br      ollama;
    openreplay.sittax.com.br  openreplay;
    prometheus.sittax.com.br  prometheus;
    monitor.sittax.com.br     monitor;
    supabase.sittax.com.br    supabase;
    supabase.sittax.com       supabase;
    coolify.sittax.com.br     coolify;
    coolify.sittax.com        coolify;
    proxy.sittax.com.br       proxy;
    sittax.bytoken.com.br     bytoken;

    sittax.com.br             monitor;
    sittax.com                monitor;

    # claw.sittax.com.br      clawd;
    # Exemplos para futuros   serviços:
    # api.sittax.com.br       api_http;
    # app.sittax.com.br       app_http;

    # Default
    default                   allDefault_http;
}
